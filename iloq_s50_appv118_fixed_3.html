<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>iLOQ S50</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* === GUESTCOMPASS PALETTE ===
   Oranje:  #F57C20  (primary)
   Donker:  #2D2D2D  (text / topbar)
   Groen:   #2E7D32  (success)
   Rood:    #C62828  (danger)
   Amber:   #E65100  (warning)
   BG:      #F4F4F2  (page)
   Wit:     #FFFFFF  (cards)
   Rand:    #E0E0E0
*/
@import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#F4F4F2;color:#2D2D2D;font-family:'Open Sans',Helvetica,Arial,sans-serif;font-size:16px}
/* ── topbar ── */
.topbar{background:#2D2D2D;min-height:56px;padding:0 .75rem;display:flex;align-items:center;gap:.5rem;position:sticky;top:0;z-index:50;flex-wrap:nowrap}
.topbar h1{color:#fff;font-size:15px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbtn{background:transparent;border:2px solid rgba(255,255,255,.35);border-radius:8px;color:#fff;cursor:pointer;font-size:13px;font-weight:600;min-height:40px;padding:7px 10px;white-space:nowrap;font-family:'Open Sans',Helvetica,Arial,sans-serif;flex-shrink:0}
.tbtn.active{background:#F57C20;border-color:#F57C20}
.tbtn.warn{border-color:#EF9A9A;color:#FFCCBC}
.nav-menu-wrap{position:relative}
.nav-menu{display:none;position:absolute;top:calc(100% + 8px);right:0;background:#fff;border:2px solid #E0E0E0;border-radius:12px;min-width:200px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:100}
.nav-menu.open{display:block}
.nav-menu-item{display:block;width:100%;text-align:left;padding:13px 18px;font-size:15px;font-weight:600;background:none;border:none;border-bottom:1px solid #F4F4F2;cursor:pointer;color:#2D2D2D;font-family:'Open Sans',Helvetica,Arial,sans-serif;min-height:48px}
.nav-menu-item:last-child{border-bottom:none}
.nav-menu-item:hover,.nav-menu-item:active{background:#F4F4F2}
.nav-menu-item.active{color:#F57C20;background:#FFF3E0}
.nav-menu-item.warn{color:#C62828}
/* ── layout ── */
.main{max-width:680px;margin:0 auto;padding:.75rem}
/* ── login ── */
.login-wrap{min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:1rem}
.login-card{background:#fff;border-radius:16px;border:2px solid #E0E0E0;padding:2rem 1.5rem;width:100%;max-width:380px}
.login-card h2{font-size:22px;font-weight:800;color:#2D2D2D;margin-bottom:6px}
.login-card p{font-size:15px;color:#888;margin-bottom:1.5rem}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
.role-card{border:2px solid #E0E0E0;border-radius:12px;padding:1.25rem 1rem;cursor:pointer;text-align:center}
.role-card.selected{border-color:#F57C20;background:#FFF3E0}
.role-icon{font-size:28px;margin-bottom:8px}
.role-label{font-size:15px;font-weight:700;color:#2D2D2D}
.err{background:#FFEBEE;border-radius:8px;color:#C62828;font-size:14px;margin-bottom:10px;padding:8px 12px}
.lang-btn{background:#F4F4F2;border:2px solid #E0E0E0;border-radius:8px;color:#666;cursor:pointer;font-size:13px;font-weight:600;min-height:38px;padding:7px 12px}
.lang-btn.active{background:#F57C20;border-color:#F57C20;color:#fff}
/* ── cards ── */
.card{background:#fff;border:2px solid #E0E0E0;border-radius:14px;margin-bottom:1rem;overflow:hidden}
.card-head{border-bottom:2px solid #F4F4F2;display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:14px 16px}
.card-head h2{color:#2D2D2D;flex:1;font-size:17px;font-weight:800;min-width:0;min-width:120px}
.card-head .btn-sm{flex-shrink:0}
.card-head-btns{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
@media(max-width:480px){
  .card-head{flex-wrap:wrap}
  .card-head-btns{width:100%;justify-content:flex-end}
}
.card-body{padding:14px 16px}
/* ── stats ── */
.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
.stat{background:#fff;border:2px solid #E0E0E0;border-radius:12px;padding:14px 16px}
.stat-num{font-size:30px;font-weight:800}
.stat-label{color:#888;font-size:13px;margin-top:3px}
.s-orange{color:#F57C20}.s-green{color:#2E7D32}.s-red{color:#C62828}.s-dark{color:#2D2D2D}
/* ── list items ── */
.list-item{border-bottom:1px solid #F4F4F2;padding:14px 16px}
.list-item:last-child{border-bottom:none}
.list-item-top{display:flex;align-items:flex-start;gap:12px}
.li-main{color:#2D2D2D;flex:1;font-size:16px;font-weight:700;min-width:0}
.li-sub{color:#888;font-size:14px;line-height:1.4;margin-top:4px}
.li-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding-left:54px}
@media(max-width:480px){.li-actions{padding-left:0}}
.avatar{align-items:center;border-radius:50%;display:flex;flex-shrink:0;font-size:14px;font-weight:800;height:42px;justify-content:center;margin-top:1px;width:42px}
.av-orange{background:#FFF3E0;color:#E65100}
.av-green{background:#E8F5E9;color:#2E7D32}
.av-blue{background:#E3F2FD;color:#1565C0}
/* ── forms ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
label{color:#555;font-size:14px;font-weight:700}
input,select,textarea{background:#fff;border:2px solid #E0E0E0;border-radius:10px;color:#2D2D2D;font-family:inherit;font-size:16px;min-height:46px;padding:10px 12px;width:100%;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:#F57C20;outline:none}
textarea{min-height:80px;resize:vertical}
.toggle-row{align-items:center;border-bottom:1px solid #F4F4F2;display:flex;gap:14px;margin-bottom:8px;padding:12px 0}
.toggle-row label{color:#2D2D2D;cursor:pointer;flex:1;font-size:16px;font-weight:600;margin:0}
input[type=checkbox]{accent-color:#F57C20;cursor:pointer;flex-shrink:0;height:24px;min-width:24px;width:24px}
/* ── buttons ── */
.btn{align-items:center;background:#fff;border:2px solid #E0E0E0;border-radius:10px;color:#2D2D2D;cursor:pointer;display:inline-flex;font-family:inherit;font-size:15px;font-weight:700;gap:6px;justify-content:center;min-height:46px;padding:10px 18px;white-space:nowrap}
.btn:active{opacity:.75}
.btn-primary{background:#F57C20;border-color:#F57C20;color:#fff}
.btn-primary:hover{background:#E56A10;border-color:#E56A10}
.btn-sm{border-radius:8px;font-size:14px;min-height:40px;padding:8px 14px}
.btn-danger{background:#fff;border-color:#EF9A9A;color:#C62828}
.btn-success{background:#E8F5E9;border-color:#A5D6A7;color:#2E7D32}
.btn-full{margin-top:8px;width:100%}
/* ── badges ── */
.badge{border-radius:20px;display:inline-block;font-size:13px;font-weight:700;padding:4px 10px}
.b-orange{background:#FFF3E0;color:#E65100}
.b-green{background:#E8F5E9;color:#2E7D32}
.b-red{background:#FFEBEE;color:#C62828}
.b-yellow{background:#FFF9C4;color:#F57F17}
.b-blue{background:#E3F2FD;color:#1565C0}
.b-gray{background:#F4F4F2;color:#888}
.dtype-tag{background:#F4F4F2;border-radius:6px;color:#555;display:inline-block;font-size:12px;font-weight:600;padding:3px 9px}
.wall-tag{background:#E3F2FD;border-radius:5px;color:#1565C0;font-size:11px;font-weight:700;padding:2px 7px}
/* ── floor chips ── */
.floor-block{margin-bottom:1.5rem}
.floor-hdr{align-items:center;display:flex;gap:12px;margin-bottom:10px}
.floor-title{color:#2D2D2D;font-size:15px;font-weight:700}
.floor-meta{color:#888;font-size:14px}
.floor-grid{display:flex;flex-wrap:wrap;gap:8px}
.chip{align-items:center;border:2px solid;border-radius:22px;cursor:pointer;display:inline-flex;font-size:14px;font-weight:700;gap:5px;min-height:38px;padding:7px 13px}
.chip:active{opacity:.75}
.chip-green{background:#E8F5E9;border-color:#A5D6A7;color:#2E7D32}
.chip-red{background:#FFEBEE;border-color:#EF9A9A;color:#C62828}
.chip-orange{background:#FFF3E0;border-color:#FFCC80;color:#E65100}
.chip-yellow{background:#FFF9C4;border-color:#FFF176;color:#F57F17}
.divider{background:#F4F4F2;height:2px;margin:14px 0}
/* ── progress ── */
.progress-bar{background:#E0E0E0;border-radius:4px;height:8px}
.progress-fill{border-radius:4px;height:100%;transition:width .3s}
/* ── checklist ── */
.ci{align-items:flex-start;background:#fff;border:2px solid #E0E0E0;border-radius:10px;display:flex;gap:12px;margin-bottom:8px;padding:12px 14px}
.ci.checked{background:#E8F5E9;border-color:#A5D6A7}
.cbox{align-items:center;background:#fff;border:2px solid #E0E0E0;border-radius:6px;cursor:pointer;display:flex;flex-shrink:0;font-size:16px;font-weight:800;height:28px;justify-content:center;margin-top:2px;min-width:28px;width:28px}
.ci.checked .cbox{background:#C8E6C9;border-color:#2E7D32;color:#2E7D32}
.ci-text{color:#2D2D2D;cursor:pointer;flex:1;font-size:15px;line-height:1.5;padding-top:3px}
.ci.checked .ci-text{color:#2E7D32}
.ci-acts{align-items:flex-end;display:flex;flex-direction:column;flex-shrink:0;gap:5px}
.note-btn{background:none;border:none;color:#888;cursor:pointer;font-size:13px;min-height:28px;padding:4px 0;white-space:nowrap}
/* ── photos ── */
.photo-thumb{border:2px solid #E0E0E0;border-radius:10px;cursor:pointer;height:70px;object-fit:cover;width:70px}
.photo-del{align-items:center;background:#C62828;border:2px solid #fff;border-radius:50%;color:#fff;cursor:pointer;display:flex;font-size:14px;font-weight:800;height:26px;justify-content:center;padding:0;position:absolute;right:-8px;top:-8px;width:26px;z-index:10}
.photo-wrap{display:inline-block;flex-shrink:0;height:70px;position:relative;width:70px}
.photo-add-btn{align-items:center;background:#FAFAFA;border:2px dashed #BDBDBD;border-radius:10px;color:#BDBDBD;cursor:pointer;display:flex;flex-shrink:0;font-size:28px;height:70px;justify-content:center;width:70px}
.photo-req{background:#FFF3E0;border:2px solid #FFCC80;border-radius:8px;color:#E65100;font-size:14px;line-height:1.5;margin:10px 0;padding:10px 14px}
/* ── score options ── */
.score-opt{align-items:center;border:2px solid #E0E0E0;border-radius:10px;cursor:pointer;display:flex;gap:14px;margin-bottom:8px;padding:13px 14px;user-select:none}
.score-box{align-items:center;border:2px solid #E0E0E0;border-radius:6px;color:#fff;display:flex;flex-shrink:0;font-size:16px;font-weight:800;height:26px;justify-content:center;min-width:26px;width:26px}
/* ── dropdown menu ── */
.dmenu-btn{background:none;border:none;border-bottom:1px solid #F4F4F2;color:#2D2D2D;cursor:pointer;display:block;font-family:inherit;font-size:16px;font-weight:600;min-height:50px;padding:14px 18px;text-align:left;width:100%}
.dmenu-btn:last-child{border-bottom:none}
.dmenu-btn:active,.dmenu-btn:hover{background:#F4F4F2}
.dmenu-btn.gc-green{color:#2E7D32}
.dmenu-btn.gc-red{color:#C62828}
/* ── modals ── */
.modal-bg{align-items:flex-end;background:rgba(0,0,0,.55);display:none;inset:0;justify-content:center;position:fixed;z-index:200}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;padding:1.5rem 1.25rem;width:100%;max-width:600px}
.modal h2{color:#2D2D2D;font-size:18px;font-weight:800;margin-bottom:1rem}
.modal-footer{border-top:2px solid #F4F4F2;display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end;margin-top:1rem;padding-top:1rem}
.modal-footer .btn{flex:1;font-size:16px;justify-content:center;min-height:50px}
/* ── misc ── */
.import-drop{background:#FAFAFA;border:3px dashed #E0E0E0;border-radius:12px;cursor:pointer;padding:2rem;text-align:center}
.import-preview{border:1px solid #E0E0E0;border-radius:8px;font-size:14px;max-height:240px;margin-top:1rem;overflow-y:auto}
.import-preview table{border-collapse:collapse;width:100%}
.import-preview th{background:#F4F4F2;color:#888;font-size:13px;font-weight:700;padding:8px 10px;position:sticky;text-align:left;top:0}
.import-preview td{border-bottom:1px solid #F4F4F2;padding:8px 10px}
.row-ok td{background:#E8F5E9}
.export-box{background:#F4F4F2;border:1px solid #E0E0E0;border-radius:10px;margin-top:.75rem;padding:1rem}
.export-box pre{color:#2D2D2D;font-family:monospace;font-size:12px;max-height:180px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.info-box{background:#E3F2FD;border-radius:10px;color:#1565C0;font-size:15px;line-height:1.5;margin-bottom:14px;padding:12px 14px}
.breadcrumb{color:#888;display:flex;flex-wrap:wrap;font-size:14px;gap:6px;margin-bottom:1rem;align-items:center}
.breadcrumb span{color:#F57C20;cursor:pointer;font-weight:700}
.empty{color:#BDBDBD;font-size:16px;padding:2.5rem;text-align:center}
.door-card{border-bottom:2px solid #F4F4F2;padding:14px 16px}
.door-card:last-child{border-bottom:none}
.door-card-top{align-items:flex-start;display:flex;gap:10px;justify-content:space-between;margin-bottom:8px}
.door-card-name{color:#2D2D2D;font-size:16px;font-weight:700}
.door-card-meta{color:#888;font-size:14px;line-height:1.4;margin-top:3px}
.door-card-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
@media(max-width:400px){.door-card-actions .btn-sm{flex:1;min-width:0}}
.prog-row{align-items:center;display:flex;gap:8px}
.toast{background:#2E7D32;border-radius:10px;bottom:2rem;color:#fff;font-size:16px;font-weight:700;left:50%;padding:12px 24px;pointer-events:none;position:fixed;transform:translateX(-50%);white-space:nowrap;z-index:999}
input[type=file]{display:none}
@media(min-width:600px){
  .stat-row{grid-template-columns:repeat(4,1fr)}
  .modal-bg{align-items:center}
  .modal{border-radius:16px;max-height:88vh}
  .modal-footer .btn{flex:0 0 auto}
  .form-row{grid-template-columns:1fr 1fr}
}
@media(max-width:599px){
  .form-row{grid-template-columns:1fr}
  .card-head{padding:12px 14px;gap:6px}
  .card-head h2{font-size:16px}
}
@media(max-width:420px){
  .btn-sm{font-size:13px;padding:7px 10px;min-height:38px}
  .list-item{padding:12px 14px}
  .door-card{padding:12px 14px}
  .card-body{padding:12px 14px}
  .li-actions{padding-left:0}
  .stat-num{font-size:26px}
}

/* ── Mobile optimalisaties ── */
@media(max-width:480px){
  /* Fase-tabs op installatiepagina */
  .phase-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .phase-tabs::-webkit-scrollbar{display:none}
  /* Deuren grid kleinere chips */
  .chip{font-size:13px;padding:6px 11px;min-height:36px}
  /* Foto rij */
  .photo-row{gap:8px}
  .photo-thumb,.photo-wrap,.photo-add-btn{height:64px;width:64px}
  /* Score sterren */
  .score-star-btn{height:48px!important;width:48px!important}
  /* Modal bijna full screen */
  .modal{padding:1.25rem 1rem}
  .modal h2{font-size:17px}
  /* Breadcrumb */
  .breadcrumb{font-size:13px}
  /* Kaart koptekst */
  .card-head{padding:12px 14px}
  /* Toast */
  .toast{width:calc(100% - 2rem);text-align:center;white-space:normal}
}
</style>
</head>
<body>
<div class="topbar">
  <h1 id="topbar-title">iLOQ S50</h1>
  <div id="topbar-btns" style="display:flex;gap:6px;flex-shrink:0"></div>
</div>
<div class="main" id="main-content"></div>
<div class="modal-bg" id="modal-generic"><div class="modal" id="modal-generic-inner"></div></div>
<div class="modal-bg" id="modal-confirm">
  <div class="modal" style="max-width:360px">
    <h2 id="confirm-msg" style="font-size:17px;font-weight:600;line-height:1.4;margin-bottom:1.5rem"></h2>
    <div class="modal-footer">
      <button class="btn" style="min-height:50px;font-size:16px" onclick="confirmCancel()">Annuleren</button>
      <button class="btn btn-danger" style="min-height:50px;font-size:16px" id="confirm-ok-btn">Verwijderen</button>
    </div>
  </div>
</div>
<div class="modal-bg" id="modal-photo">
  <div style="max-width:600px;padding:1rem;position:relative;width:100%">
    <img id="photo-full" style="border-radius:14px;display:block;max-height:80vh;object-fit:contain;width:100%">
    <button onclick="closeModal('modal-photo')" style="background:#fff;border:2px solid #E0E0E0;border-radius:50%;cursor:pointer;font-size:18px;font-weight:800;height:36px;position:absolute;right:0;top:0;width:36px">x</button>
  </div>
</div>
<input type="file" id="photo-input" accept="image/*" multiple>
<input type="file" id="import-file" accept=".xlsx,.xls,.csv">
<div class="modal-bg" id="modal-scan">
  <div class="modal" id="modal-scan-inner" style="padding:0;overflow:hidden;max-width:480px">
    <!-- header -->
    <div style="background:#2D2D2D;padding:14px 18px;display:flex;align-items:center;justify-content:space-between">
      <span style="color:#fff;font-size:16px;font-weight:800">&#128247; Scannen</span>
      <button onclick="closeScanner()" style="background:transparent;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1">&#10005;</button>
    </div>
    <!-- tabs -->
    <div style="display:flex;border-bottom:2px solid #F4F4F2">
      <button id="scan-tab-cylinder" onclick="switchScanTab('cylinder')"
        style="flex:1;background:#fff;border:none;border-bottom:3px solid #F57C20;color:#F57C20;cursor:pointer;font-family:inherit;font-size:14px;font-weight:800;padding:12px 8px;transition:all .15s">
        &#128273; Cilinder
      </button>
      <button id="scan-tab-door" onclick="switchScanTab('door')"
        style="flex:1;background:#fff;border:none;border-bottom:3px solid transparent;color:#888;cursor:pointer;font-family:inherit;font-size:14px;font-weight:800;padding:12px 8px;transition:all .15s">
        &#128682; Deur
      </button>
    </div>
    <!-- camera view (shared) -->
    <div style="position:relative;background:#000;min-height:240px;display:flex;align-items:center;justify-content:center">
      <video id="scan-video" autoplay playsinline muted style="width:100%;max-height:280px;display:block;object-fit:cover"></video>
      <div id="scan-overlay" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
        <div id="scan-frame" style="width:200px;height:140px;border:3px solid #F57C20;border-radius:12px;box-shadow:0 0 0 2000px rgba(0,0,0,.45)"></div>
      </div>
      <div id="scan-hint" style="position:absolute;bottom:10px;left:0;right:0;text-align:center;color:#fff;font-size:13px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.8)">Richt op QR-code of streepjescode</div>
    </div>
    <!-- cylinder tab body -->
    <div id="scan-body-cylinder" style="padding:16px 18px">
      <div style="font-size:12px;font-weight:700;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Of voer serienummer in (8 cijfers)</div>
      <div style="display:flex;gap:8px">
        <input id="scan-input-cylinder" type="text" inputmode="numeric" maxlength="8" placeholder="12345678"
          style="flex:1;font-size:18px;font-weight:700;letter-spacing:.1em;text-align:center;min-height:48px;border:2px solid #E0E0E0;border-radius:10px;padding:8px 12px"
          onkeydown="if(event.key==='Enter')handleCylinderScan(this.value.trim())">
        <button onclick="handleCylinderScan(byId('scan-input-cylinder').value.trim())"
          style="background:#F57C20;border:none;border-radius:10px;color:#fff;cursor:pointer;font-size:15px;font-weight:700;min-height:48px;padding:0 18px">OK</button>
      </div>
    </div>
    <!-- door tab body -->
    <div id="scan-body-door" style="padding:16px 18px;display:none">
      <div style="font-size:12px;font-weight:700;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Of voer deurnummer in (vrij formaat)</div>
      <div style="display:flex;gap:8px">

/* ══ STATUS ══ */
var SCORE_TOTAL=6;
function checkedCount(d){return Object.values(d.checked||{}).filter(Boolean).length;}
function hasQ1Photo(d){return d.scores&&d.scores.q1photos&&d.scores.q1photos.length>0;}
function hasQ5Photo(d){return d.scores&&d.scores.q5photos&&d.scores.q5photos.length>0;}
function scoreCompletedCount(d){var sc=d.scores||{},n=0;if(sc.q1!=null)n++;if(hasQ1Photo(d))n++;if(sc.q2!=null)n++;if(sc.q4!=null)n++;if(sc.q5!=null)n++;if(hasQ5Photo(d))n++;return n;}
function totalAllItems(){return SCORE_TOTAL;}
function completedAllItems(d){return scoreCompletedCount(d);}
function pct(d){return Math.round((completedAllItems(d)/totalAllItems())*100);}
function hasLowScore(d){var s=d.scores&&d.scores.q2!=null?d.scores.q2:null;return s!==null&&s<=3;}
function doorHasAlert(d){return hasLowScore(d)&&!(d.scores&&d.scores.q2_resolved);}
function statusOf(d){var c=completedAllItems(d);if(c===0)return'planned';if(c>=totalAllItems())return'done';return'busy';}
function doorName(d){return d.naam||(d.kamer?'Kamer '+d.kamer:d.adres)||'—';}

/* ══ TRASH ══ */
function purgeTrash(){var cutoff=Date.now()-TRASH_DAYS*86400000;DB.trash=(DB.trash||[]).filter(function(t){return new Date(t.deletedAt).getTime()>cutoff;});}
function trashDaysLeft(item){return Math.max(0,Math.ceil((new Date(item.deletedAt).getTime()+TRASH_DAYS*86400000-Date.now())/86400000));}
function moveToTrash(type,data,rel){if(!DB.trash)DB.trash=[];DB.trash.push({id:uid(),type:type,deletedAt:new Date().toISOString(),data:data,relatedIds:rel||{}});}
function restoreFromTrash(tid){var item=DB.trash.find(function(t){return t.id===tid;});if(!item)return;if(item.type==='door')DB.doors.push(item.data);else if(item.type==='project'){DB.projects.push(item.data);(item.relatedIds.doors||[]).forEach(function(d){DB.doors.push(d);});}else if(item.type==='location'){DB.locations.push(item.data);(item.relatedIds.projects||[]).forEach(function(p){DB.projects.push(p);});(item.relatedIds.doors||[]).forEach(function(d){DB.doors.push(d);});}else if(item.type==='client'){DB.clients.push(item.data);(item.relatedIds.locations||[]).forEach(function(l){DB.locations.push(l);});(item.relatedIds.projects||[]).forEach(function(p){DB.projects.push(p);});(item.relatedIds.doors||[]).forEach(function(d){DB.doors.push(d);});}DB.trash=DB.trash.filter(function(t){return t.id!==tid;});saveDB();showToast('Item hersteld');renderTrash();}
function permanentDelete(tid){showConfirm('Permanent verwijderen?',function(){DB.trash=DB.trash.filter(function(t){return t.id!==tid;});saveDB();renderTrash();showToast('Verwijderd');});}
function emptyTrash(){showConfirm('Prullenbak leegmaken?',function(){DB.trash=[];saveDB();renderTrash();showToast('Prullenbak geleegd');});}

function chooseRole(r){_loginRole=r;byId('rc-admin').classList.toggle('selected',r==='admin');byId('rc-installer').classList.toggle('selected',r==='installer');byId('inst-proj-row').style.display=r==='installer'?'':'none';byId('pin-input').value='';}
function doLogin(){
  var t=T();var pin=byId('pin-input').value;var err=byId('login-err');
  if(!_loginRole){err.textContent=t.err_role||'Kies een rol';err.style.display='';return;}
  if(_loginRole==='admin'){
    if(pin===(localStorage.getItem('iloq_admin_pin')||'1234')){session={role:'admin',projectId:null};renderAdmin();}
    else{err.textContent=t.err_pin;err.style.display='';}
  } else {
    var pid=byId('login-project').value;var proj=DB.projects.find(function(p){return p.id===pid;});
    if(!proj){err.textContent=t.err_project;err.style.display='';return;}
    if(pin===proj.pinInstaller){session={role:'installer',projectId:pid};renderInstaller();}
    else{err.textContent=t.err_pin;err.style.display='';}
  }
}function projectLabel(p){var loc=DB.locations.find(function(l){return l.id===p.locationId;});var cli=loc?DB.clients.find(function(c){return c.id===loc.clientId;}):null;return p.name+(loc?' — '+loc.name:'')+(cli?' ('+cli.name+')':'');}

    '<div class="stat"><div class="stat-num s-dark">'+DB.clients.length+'</div><div class="stat-label">'+t.stat_clients+'</div></div>'+

    '<div class="stat"><div class="stat-num s-green">'+done+'</div><div class="stat-label">'+t.stat_done+'</div></div>'+
    '</div><div class="card"><div class="card-head"><h2>'+t.active_projects+'</h2>'+
    '<div class="card-head-btns">'+
    '<button class="btn btn-sm" style="background:#FFF3E0;color:#E65100;border-color:#FFCC80" onclick="openInviteInstaller()">&#128231; + Monteur</button>'+
    '<button class="btn btn-sm btn-primary" onclick="openNewProject()">'+t.btn_new+'</button>'+
    '</div></div>';
  if(!active.length){h+='<div class="empty">'+t.no_projects+'</div>';}
  else active.forEach(function(p){
    var loc=DB.locations.find(function(l){return l.id===p.locationId;})||{};
    var cli=DB.clients.find(function(c){return c.id===loc.clientId;})||{};
    var pd=DB.doors.filter(function(d){return d.projectId===p.id;});
    var pdone=pd.filter(function(d){return statusOf(d)==='done';}).length;
    h+='<div class="list-item"><div class="list-item-top">'+
      '<div class="avatar av-orange">'+p.name.slice(0,2).toUpperCase()+'</div>'+
      '<div style="flex:1;min-width:0;cursor:pointer" onclick="adminGo(\'project\',{projectId:\''+p.id+'\'})">'+
      '<div class="li-main">'+p.name+'</div>'+
      '<div class="li-sub">'+(cli.name||'—')+' · '+(loc.name||'—')+'<br>'+pdone+'/'+pd.length+' '+t.stat_done.toLowerCase()+'</div>'+
      '</div><span class="badge '+(pdone===pd.length&&pd.length>0?'b-green':'b-orange')+'">'+pdone+'/'+pd.length+'</span>'+
      '</div><div class="li-actions">'+
      '<button class="btn btn-sm btn-primary" onclick="adminGo(\'project\',{projectId:\''+p.id+'\'})">'+t.btn_view+'</button>'+
      '<button class="btn btn-sm" onclick="archiveProject(\''+p.id+'\')">'+t.btn_archive+'</button>'+
      '<button class="btn btn-sm btn-danger" onclick="deleteProject(\''+p.id+'\')">'+t.btn_delete+'</button>'+
      '</div></div>';
  });
  h+='</div>';byId('main-content').innerHTML=h;
}

/* ── Trash ── */
function renderTrash(){
  purgeTrash();var items=DB.trash||[];
  var tl={door:'Deur',project:'Project',location:'Locatie',client:'Klant'};
  var h='<div class="card"><div class="card-head"><h2>Prullenbak</h2>';
  if(items.length)h+='<button class="btn btn-sm btn-danger" onclick="emptyTrash()">Leegmaken</button>';
  h+='</div>';
  if(!items.length)h+='<div class="empty">Prullenbak is leeg.</div>';
  else{h+='<div style="color:#888;font-size:14px;padding:10px 16px">Items worden na '+TRASH_DAYS+' dagen automatisch verwijderd.</div>';
  items.slice().sort(function(a,b){return new Date(b.deletedAt)-new Date(a.deletedAt);}).forEach(function(item){
    var d=item.data;var lbl=d.name||d.naam||(d.kamer?'Kamer '+d.kamer:d.adres)||'—';var days=trashDaysLeft(item);
    h+='<div class="list-item"><div class="list-item-top">'+
      '<div class="avatar" style="background:#FFF3E0;color:#E65100">'+lbl.slice(0,2).toUpperCase()+'</div>'+
      '<div style="flex:1;min-width:0"><div class="li-main">'+lbl+'</div>'+
      '<div class="li-sub">'+(tl[item.type]||item.type)+' · '+new Date(item.deletedAt).toLocaleDateString('nl-NL')+' · nog '+days+' dag'+(days!==1?'en':'')+'</div>'+
      '</div></div><div class="li-actions">'+
      '<button class="btn btn-sm btn-success" onclick="restoreFromTrash(\''+item.id+'\')">Herstellen</button>'+
      '<button class="btn btn-sm btn-danger" onclick="permanentDelete(\''+item.id+'\')">Permanent verwijderen</button>'+
      '</div></div>';
  });}
  h+='</div>';byId('main-content').innerHTML=h;
}

function archiveProject(pid){var p=DB.projects.find(function(x){return x.id===pid;});if(!p)return;p.archived=true;p.archivedAt=new Date().toISOString();saveDB();showToast('Project gearchiveerd');adminGo('dashboard');}
function unarchiveProject(pid){var p=DB.projects.find(function(x){return x.id===pid;});if(!p)return;p.archived=false;delete p.archivedAt;saveDB();showToast('Project teruggezet');renderArchive();}
function deleteProject(pid){var p=DB.projects.find(function(x){return x.id===pid;});if(!p)return;showConfirm('Project "'+p.name+'" naar prullenbak?',function(){var rd=DB.doors.filter(function(d){return d.projectId===pid;});moveToTrash('project',p,{doors:rd});DB.projects=DB.projects.filter(function(x){return x.id!==pid;});DB.doors=DB.doors.filter(function(d){return d.projectId!==pid;});saveDB();showToast('Project naar prullenbak');if(AV.screen==='archive')renderArchive();else adminGo('dashboard');});}

/* ── Floor overview ── */
function renderFloorOverview(doors,pid,isAdmin){
  var el=byId('floor-ov');if(!el)return;
  if(!doors.length){el.innerHTML='<div class="empty" style="padding:1rem">Nog geen deuren.</div>';return;}
  var floors={};doors.forEach(function(d){var k=d.verdieping!==undefined&&d.verdieping!==''?d.verdieping:'?';if(!floors[k])floors[k]=[];floors[k].push(d);});
  var keys=Object.keys(floors).sort(function(a,b){if(a==='?')return 1;if(b==='?')return-1;var na=parseFloat(a),nb=parseFloat(b);if(!isNaN(na)&&!isNaN(nb))return na-nb;return a.localeCompare(b);});
  var h='';
  keys.forEach(function(k,ki){
    var ds=floors[k];var fdone=ds.filter(function(d){return statusOf(d)==='done';}).length;
    h+='<div class="floor-block"><div class="floor-hdr"><span class="floor-title">'+(k==='?'?'Onbekend':'Verdieping '+k)+'</span><span class="floor-meta">'+fdone+'/'+ds.length+'</span></div><div class="floor-grid">';
    ds.forEach(function(d){
      var st=statusOf(d);var ha=doorHasAlert(d);
      var cls=ha?'chip-red':st==='done'?'chip-green':st==='busy'?'chip-orange':'chip-red';
      var icon=ha?'!':st==='done'?'v':st==='busy'?'~':'o';
      var wr=d.wandlezer?'<span class="wall-tag" style="margin-left:3px">W</span>':'';
      var action=isAdmin?'adminGo(\'install\',{doorId:\''+d.id+'\',projectId:\''+pid+'\'})':'installerOpenDoor(\''+d.id+'\')';
      h+='<div class="chip '+cls+'" onclick="'+action+'">'+icon+' '+doorName(d)+wr+'</div>';
    });
    h+='</div></div>';if(ki<keys.length-1)h+='<div class="divider"></div>';
  });
  el.innerHTML=h;
}

function buildProjDashHtml(doors,pid){
  var notDone=doors.filter(function(d){var sc=d.scores||{};return sc.q5==='no'||sc.q5==='other';});
  var studentFail=doors.filter(function(d){var sc=d.scores||{};return sc.q4==='no';});
  var lowScore=doors.filter(function(d){var sc=d.scores||{};return (sc.q1!=null&&sc.q1<=3)||(sc.q2!=null&&sc.q2<=3);});
  var totalDone=doors.filter(function(d){return statusOf(d)==='done';}).length;
  var totalBusy=doors.filter(function(d){return statusOf(d)==='busy';}).length;
  var totalPct=doors.length?Math.round((totalDone/doors.length)*100):0;

  /* summary tiles */
  var h='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem">';
  function statTile(val,label,col){
    return '<div style="background:#fff;border:2px solid #E0E0E0;border-radius:14px;padding:16px 14px;text-align:center">'+
      '<div style="color:'+col+';font-size:28px;font-weight:800;line-height:1">'+val+'</div>'+
      '<div style="color:#888;font-size:12px;font-weight:600;margin-top:5px;text-transform:uppercase;letter-spacing:.04em">'+label+'</div>'+
      '</div>';
  }
  h+=statTile(totalDone,'Gereed','#2E7D32');
  h+=statTile(totalBusy,'Bezig','#F57C20');
  h+=statTile(doors.length-totalDone-totalBusy,'Gepland','#888');
  h+='</div>';

  /* overall progress */
  h+='<div style="background:#fff;border:2px solid #E0E0E0;border-radius:14px;padding:16px 18px;margin-bottom:1rem">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
    '<span style="font-size:14px;font-weight:700;color:#2D2D2D">Totale voortgang</span>'+
    '<span style="font-size:14px;font-weight:800;color:'+(totalPct===100?'#2E7D32':'#F57C20')+'">'+ totalPct+'%</span>'+
    '</div>'+
    '<div style="background:#F0F0EE;border-radius:8px;height:12px;overflow:hidden">'+
    '<div style="background:'+(totalPct===100?'#2E7D32':'#F57C20')+';border-radius:8px;height:100%;transition:width .5s ease;width:'+totalPct+'%"></div>'+
    '</div>'+
    '</div>';

  /* aandachtspunten */
  var alerts=[
    {items:notDone,   icon:'✕', label:'Niet succesvol afgerond',      cat:'notdone',    accentBg:'#FFEBEE',accentFg:'#C62828'},
    {items:studentFail,icon:'!',label:'Student kon deur niet openen', cat:'studentfail',accentBg:'#FFF3E0',accentFg:'#E65100'},
    {items:lowScore,  icon:'★', label:'Score 3 of lager',              cat:'lowscore',   accentBg:'#FFFDE7',accentFg:'#F57F17'},
  ];
  var hasAlerts=alerts.some(function(a){return a.items.length>0;});

  if(hasAlerts){
    h+='<div style="background:#fff;border:2px solid #E0E0E0;border-radius:14px;overflow:hidden;margin-bottom:1rem">'+
      '<div style="padding:14px 18px;border-bottom:2px solid #F4F4F2">'+
      '<span style="font-size:14px;font-weight:800;color:#2D2D2D;letter-spacing:.02em">Aandachtspunten</span>'+
      '</div>';
    alerts.forEach(function(a){
      if(!a.items.length)return;
      h+='<div onclick="adminGo(\'dashdetail\',{projectId:\''+pid+'\',category:\''+a.cat+'\'})" '+
        'style="display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid #F4F4F2;cursor:pointer" '+
        'onmouseover="this.style.background=\'#FAFAF8\'" onmouseout="this.style.background=\'\'"> ';
      h+='<div style="align-items:center;background:'+a.accentBg+';border-radius:10px;color:'+a.accentFg+';display:flex;flex-shrink:0;font-size:16px;font-weight:800;height:40px;justify-content:center;width:40px">'+a.icon+'</div>'+
        '<div style="flex:1;min-width:0">'+
        '<div style="color:#2D2D2D;font-size:15px;font-weight:700">'+a.label+'</div>'+
        '<div style="color:#888;font-size:13px;margin-top:2px">'+a.items.slice(0,2).map(function(d){return doorName(d);}).join(', ')+(a.items.length>2?' + '+(a.items.length-2)+' meer':'')+'</div>'+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
        '<span style="background:'+a.accentBg+';border-radius:20px;color:'+a.accentFg+';font-size:13px;font-weight:800;padding:3px 10px">'+a.items.length+'</span>'+
        '<span style="color:#BDBDBD;font-size:20px">›</span>'+
        '</div>';
      h+='</div>';
    });
    h+='</div>';
  } else {
    h+='<div style="background:#E8F5E9;border:2px solid #A5D6A7;border-radius:14px;padding:16px 18px;margin-bottom:1rem;display:flex;align-items:center;gap:12px">'+
      '<div style="font-size:22px">✓</div>'+
      '<div style="color:#2E7D32;font-size:15px;font-weight:700">Geen aandachtspunten — alles in orde</div>'+
      '</div>';
  }

  /* voortgang per verdieping */
  if(doors.length){
    var floors={};
    doors.forEach(function(d){var k=d.verdieping!==undefined&&d.verdieping!==''?d.verdieping:'?';if(!floors[k])floors[k]=[];floors[k].push(d);});
    var keys=Object.keys(floors).sort(function(a,b){if(a==='?')return 1;if(b==='?')return-1;var na=parseFloat(a),nb=parseFloat(b);if(!isNaN(na)&&!isNaN(nb))return na-nb;return a.localeCompare(b);});

    h+='<div style="background:#fff;border:2px solid #E0E0E0;border-radius:14px;overflow:hidden;margin-bottom:1rem">'+

      'onmouseover="this.style.background=\'#FAFAF8\'" onmouseout="this.style.background=\'\'"> '+
      '<span style="font-size:14px;font-weight:800;color:#2D2D2D;letter-spacing:.02em">Voortgang per verdieping</span>'+
      '<span style="color:#BDBDBD;font-size:20px">›</span></div>';

    keys.forEach(function(k,ki){
      var ds=floors[k];
      var fdone=ds.filter(function(d){return statusOf(d)==='done';}).length;
      var fpct=Math.round((fdone/ds.length)*100);
      var done100=fpct===100;
      h+='<div style="padding:14px 18px'+(ki<keys.length-1?';border-bottom:1px solid #F4F4F2':'')+'">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
        '<span style="color:#2D2D2D;font-size:14px;font-weight:700">'+(k==='?'?'Onbekend':'Verdieping '+k)+'</span>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
        '<span style="color:#888;font-size:13px">'+fdone+'/'+ds.length+'</span>'+
        '<span style="background:'+(done100?'#E8F5E9':'#F4F4F2')+';border-radius:20px;color:'+(done100?'#2E7D32':'#888')+';font-size:12px;font-weight:800;padding:2px 9px">'+ fpct+'%</span>'+
        '</div></div>'+
        '<div style="background:#F0F0EE;border-radius:6px;height:8px;overflow:hidden">'+
        '<div style="background:'+(done100?'#2E7D32':'#F57C20')+';border-radius:6px;height:100%;transition:width .4s ease;width:'+fpct+'%"></div>'+
        '</div></div>';
    });
    h+='</div>';
  }

  return h;
}
/* ── Dashboard detail pages ── */

function renderFloorDetail(pid,doors){
  var floors={};

  var h='<div class="breadcrumb"><span onclick="adminGo(\'projdash\',{projectId:\''+pid+'\'})">&#8592; Dashboard</span></div>';
  keys.forEach(function(k){
    var ds=floors[k];
    var done=ds.filter(function(d){return statusOf(d)==='done';});
    var busy=ds.filter(function(d){return statusOf(d)==='busy';});
    var todo=ds.filter(function(d){return statusOf(d)==='planned';});
    var fpct=Math.round((done.length/ds.length)*100);

          '<span style="color:'+tc+';font-size:20px">›</span></div>';
      });
      s+='</div>';return s;
    }

function sendInvite(){
  var first=byId('inv-first').value.trim();
  var last=byId('inv-last').value.trim();
  var email=byId('inv-email').value.trim();
  var pin=byId('inv-pin').value.trim();
  var msg=byId('inv-msg').value.trim();
  var cbs=document.querySelectorAll('.invite-proj-cb:checked');
  var selectedPids=Array.from(cbs).map(function(cb){return cb.value;});

  if(!first||!last){showToast('Vul voornaam en achternaam in',false);return;}
  if(!email||!email.includes('@')){showToast('Vul een geldig e-mailadres in',false);return;}
  if(!pin||pin.length<4){showToast('Vul een geldige pincode in (min. 4 cijfers)',false);return;}
  if(!selectedPids.length){showToast('Selecteer minimaal één project',false);return;}
  if(selectedPids.length>2){showToast('Maximaal 2 projecten per monteur',false);return;}

  /* save installer to DB */
  if(!DB.installers)DB.installers=[];
  var existingIdx=DB.installers.findIndex(function(i){return i.email===email;});
  var installerRecord={id:existingIdx>=0?DB.installers[existingIdx].id:uid(),firstName:first,lastName:last,email:email,pin:pin,projectIds:selectedPids,invitedAt:new Date().toISOString()};
  if(existingIdx>=0){DB.installers[existingIdx]=installerRecord;}else{DB.installers.push(installerRecord);}

  /* update the pinInstaller for selected projects */
  selectedPids.forEach(function(pid){
    var p=DB.projects.find(function(x){return x.id===pid;});
    if(p)p.pinInstaller=pin;
  });
  saveDB();

  /* build email body */
  var projectLines=selectedPids.map(function(pid){
    var p=DB.projects.find(function(x){return x.id===pid;});
    var loc=DB.locations.find(function(l){return l.id===(p&&p.locationId);})||{};
    var cli=DB.clients.find(function(c){return c.id===loc.clientId;})||{};
    return'- '+(p?p.name:'?')+(loc.name?' ('+loc.name:''+(cli.name?', '+cli.name:'')+(loc.name?')':''));
  }).join('\n');

  var appUrl='https://app.iloq-installatie.nl'; /* placeholder — replace with real URL when live */
  var subject=encodeURIComponent('Uitnodiging iLOQ S50 installatie-app');
  var body='Beste '+first+' '+last+',\n\n'+
    (msg?msg+'\n\n':'')+
    'Je bent uitgenodigd als monteur voor de iLOQ S50 installatie-app.\n\n'+
    '——————————————————————————\n'+
    'JE INLOGGEGEVENS\n'+
    '——————————————————————————\n'+
    'Rol: Monteur\n'+
    'Pincode: '+pin+'\n\n'+
    'TOEGEWEZEN PROJECT(EN)\n'+
    '——————————————————————————\n'+
    projectLines+'\n\n'+
    'STARTEN\n'+
    '——————————————————————————\n'+
    '1. Open de app via onderstaande link\n'+
    '2. Kies "Monteur" als rol\n'+
    '3. Selecteer jouw project\n'+
    '4. Vul de pincode in: '+pin+'\n\n'+
    'App-link: '+appUrl+'\n\n'+
    '——————————————————————————\n'+
    'Bij vragen kun je contact opnemen met de beheerder.\n\n'+
    'Met vriendelijke groet,\n'+
    'iLOQ S50 Installatiebeheer';

  closeModal('modal-generic');
  window.location.href='mailto:'+encodeURIComponent(email)+'?subject='+subject+'&body='+encodeURIComponent(body);
  showToast('E-mailclient geopend voor '+first+' '+last);
}

function openImportDoors(pid){openModal('<h2>Deuren importeren</h2><div class="info-box">Kolommen: Verdieping, Kamer, Omschrijving, Type, Adres, Serienummer, Datum, Monteur, Bewoner, Wandlezer (ja/nee), Notitie</div><button class="btn btn-sm btn-success" onclick="downloadTemplate()" style="margin-bottom:12px">Template downloaden</button><div class="import-drop" onclick="byId(\'import-file\').click()"><div style="color:#BDBDBD;font-size:36px">&#8679;</div><p style="color:#888;font-size:16px;margin-top:8px">Klik of sleep .xlsx / .csv</p></div><div id="import-preview-area"></div><div class="modal-footer"><button class="btn" onclick="closeModal(\'modal-generic\')">Annuleren</button><button class="btn btn-primary" id="btn-do-import" style="display:none" onclick="doImportDoors(\''+pid+'\')">Importeren</button></div>');window._importRows=[];byId('import-file').onchange=function(e){if(e.target.files[0])parseImportFile(e.target.files[0]);};}
function fi(hdrs,v){return hdrs.findIndex(function(h){return v.some(function(x){return h.includes(x);});});}
function gs(row,idx){return idx>=0&&row[idx]!==undefined?String(row[idx]).trim():'';}
function fmtDate(s){if(!s)return'';var d=new Date(s);return isNaN(d)?s:d.toISOString().slice(0,10);}
function parseImportFile(file){var r=new FileReader();r.onload=function(e){var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});var ws=wb.Sheets[wb.SheetNames[0]];var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});if(rows.length<2)return;var hdrs=rows[0].map(function(h){return String(h).trim().toLowerCase();});var cm={floor:fi(hdrs,['verdieping','floor','etage']),room:fi(hdrs,['kamer','room','zimmer']),name:fi(hdrs,['omschrijving','description','naam']),type:fi(hdrs,['type','typ']),address:fi(hdrs,['adres','address']),serial:fi(hdrs,['serienummer','serial']),date:fi(hdrs,['datum','date']),installer:fi(hdrs,['monteur','installer']),resident:fi(hdrs,['bewoner','resident']),wall:fi(hdrs,['wandlezer','wall']),note:fi(hdrs,['notitie','note'])};window._importRows=[];for(var i=1;i<rows.length;i++){var row=rows[i];if(row.every(function(c){return !c;}))continue;window._importRows.push({verdieping:gs(row,cm.floor),kamer:gs(row,cm.room),naam:gs(row,cm.name),type:gs(row,cm.type)||DOOR_TYPES()[0],adres:gs(row,cm.address),serial:gs(row,cm.serial),datum:fmtDate(gs(row,cm.date)),monteur:gs(row,cm.installer),bewoner:gs(row,cm.resident),wandlezer:/^(ja|yes|1|true)/i.test(gs(row,cm.wall)),notitie:gs(row,cm.note)});}var ph='<div style="color:#2D2D2D;font-size:15px;margin:14px 0 8px">'+window._importRows.length+' rijen gevonden</div><div class="import-preview"><table><thead><tr><th>Verd.</th><th>Kamer</th><th>Omschrijving</th><th>Type</th><th>Monteur</th></tr></thead><tbody>';window._importRows.forEach(function(d){ph+='<tr class="row-ok"><td>'+(d.verdieping||'—')+'</td><td>'+(d.kamer||'—')+'</td><td>'+(d.naam||'—')+'</td><td>'+(d.type||'—')+'</td><td>'+(d.monteur||'—')+'</td></tr>';});ph+='</tbody></table></div>';byId('import-preview-area').innerHTML=ph;byId('btn-do-import').style.display='';};r.readAsArrayBuffer(file);}
function doImportDoors(pid){(window._importRows||[]).forEach(function(d){DB.doors.push({id:uid(),projectId:pid,verdieping:d.verdieping,kamer:d.kamer,naam:d.naam,type:d.type,adres:d.adres,serial:d.serial,datum:d.datum,monteur:d.monteur,bewoner:d.bewoner,wandlezer:d.wandlezer,notitie:d.notitie,checked:{},notes:{},photos:{},scores:{}});});saveDB();closeModal('modal-generic');renderProjectDetail(pid);showToast((window._importRows||[]).length+' deuren geïmporteerd');}
function downloadTemplate(){var cols=['Verdieping','Kamer','Omschrijving','Type','Adres','Serienummer','Datum','Monteur','Bewoner','Wandlezer','Notitie'];var ex=[['0','101','Woningdeur 101','Woningdeur','Voorbeeldstraat 1','S50-001','2025-09-01','Jan de Vries','A. Jansen','nee',''],['1','GR','Gangdeur noord','Gangdeur','Voorbeeldstraat 1','S50-002','2025-09-02','Jan de Vries','','ja','']];var ws=XLSX.utils.aoa_to_sheet([cols].concat(ex));ws['!cols']=cols.map(function(){return{wch:16};});var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Deuren');XLSX.writeFile(wb,'iloq_s50_template.xlsx');}

function renderInstallView(did,pid,isAdmin){

  else h+='<div class="breadcrumb"><span onclick="renderInstaller()">&#8592; Terug</span></div>';
  h+='<div class="card" style="margin-bottom:1rem"><div class="card-body">'+
    '<div style="color:#2D2D2D;font-size:18px;font-weight:800;margin-bottom:6px">'+doorName(door)+' '+wr+'</div>'+
    '<div style="color:#888;font-size:15px;margin-bottom:10px">'+(door.type||'')+' '+(door.verdieping?'· Verd. '+door.verdieping:'')+' '+(door.kamer?'· Kamer '+door.kamer:'')+' · S50 #'+(door.serial||'?')+'<br>'+(door.monteur||'')+(door.bewoner?' · '+door.bewoner:'')+'</div>'+
    '<div style="align-items:center;display:flex;gap:10px">'+
    '<div class="progress-bar" style="flex:1;height:12px"><div class="progress-fill" style="width:'+p2+'%;background:'+(p2===100?'#2E7D32':'#F57C20')+'"></div></div>'+
    '<span style="color:#888;font-size:15px;font-weight:700">'+da+'/'+ta+'</span></div>'+
    (alert?'<div style="background:#FFEBEE;border:2px solid #EF9A9A;border-radius:8px;color:#C62828;font-size:15px;font-weight:600;margin-top:10px;padding:10px 14px">&#9888; '+L.alertMsg+'</div>':'')+
    '</div></div>';
  h+=renderScoreSection(door,pid,isAdmin);

  byId('main-content').innerHTML=h;
}

/* ── Score section ── */
function renderScoreSection(door,pid,isAdmin){

  var q3n=sc.q3note||'',resolved=sc.q2_resolved||false;
  var q4=sc.q4!=null?sc.q4:null,q4opts=sc.q4opts||[];
  var q5=sc.q5!=null?sc.q5:null,q5n=sc.q5note||'';
  var q1ph=sc.q1photos||[],q5ph2=sc.q5photos||[];

  function stars(qk,val){var s='<div style="display:flex;gap:8px;flex-wrap:wrap;margin:10px 0">';for(var i=1;i<=5;i++){var sel=val===i;s+='<button onclick="saveScoreVal(\''+did+'\',\''+qk+'\','+i+',\''+pid+'\','+isAdmin+')" style="background:'+(sel?'#F57C20':'#fff')+';border:2px solid '+(sel?'#F57C20':'#E0E0E0')+';border-radius:10px;color:'+(sel?'#fff':'#888')+';cursor:pointer;font-size:18px;font-weight:800;height:54px;width:54px">'+i+'</button>';}return s+'</div>';}
  function choices(qk,cur,opts){var s='<div style="display:flex;flex-wrap:wrap;gap:10px;margin:10px 0">';for(var i=0;i<opts.length;i++){var o=opts[i];var sel=cur===o.val;s+='<button onclick="saveScoreStr(\''+did+'\',\''+qk+'\',\''+o.val+'\',\''+pid+'\','+isAdmin+')" style="background:'+(sel?o.color:'#fff')+';border:2px solid '+(sel?o.color:'#E0E0E0')+';border-radius:10px;color:'+(sel?'#fff':'#2D2D2D')+';cursor:pointer;font-size:16px;font-weight:700;min-height:50px;padding:10px 20px">'+o.label+'</button>';}return s+'</div>';}
  function issBoxes(qk,sel,nv,nk){var s='<div style="display:flex;flex-direction:column;gap:10px;margin:10px 0">';var op=L.issueOpts;for(var i=0;i<op.length;i++){var chk=sel.indexOf(i)>=0;s+='<div onclick="toggleIssue(\''+did+'\',\''+qk+'\','+i+',\''+pid+'\','+isAdmin+')" class="score-opt" style="background:'+(chk?'#FFF3E0':'#fff')+';border-color:'+(chk?'#F57C20':'#E0E0E0')+'"><div class="score-box" style="background:'+(chk?'#F57C20':'#fff')+';border-color:'+(chk?'#F57C20':'#E0E0E0')+'">'+(chk?'&#10003;':'')+'</div><span style="color:'+(chk?'#E65100':'#2D2D2D')+';font-size:16px;font-weight:600">'+op[i]+'</span></div>';}s+='</div>';if(sel.indexOf(2)>=0)s+='<textarea style="border:2px solid #E0E0E0;border-radius:10px;font-size:15px;min-height:80px;padding:10px;width:100%" placeholder="'+L.issueNotePh+'" onchange="saveScoreNote(\''+did+'\',\''+nk+'\',this.value)">'+nv+'</textarea>';return s;}

function deleteScorePhoto(did,pk,idx,pid,isAdmin){showConfirm('Foto verwijderen?',function(){var d=DB.doors.find(function(x){return x.id===did;});if(!d||!d.scores||!d.scores[pk])return;d.scores[pk].splice(idx,1);saveDB();renderInstallView(did,pid,isAdmin);});}
function showScorePhoto(did,pk,idx){var d=DB.doors.find(function(x){return x.id===did;});var src=d.scores&&d.scores[pk]?d.scores[pk][idx]:null;if(src){byId('photo-full').src=src;byId('modal-photo').classList.add('open');}}
byId('photo-input').onchange=function(e){

};
function resizeImage(file,maxBytes,cb){var reader=new FileReader();reader.onload=function(e){var img=new Image();img.onload=function(){var w=img.width,h=img.height,q=0.92;var cv=document.createElement('canvas');var ctx=cv.getContext('2d');cv.width=w;cv.height=h;ctx.drawImage(img,0,0,w,h);var r=cv.toDataURL('image/jpeg',q);while(r.length*0.75>maxBytes&&(w>200||h>200)){q=Math.max(0.5,q-0.1);var sc=Math.sqrt(maxBytes/(r.length*0.75));w=Math.max(200,Math.floor(w*sc));h=Math.max(200,Math.floor(h*sc));cv.width=w;cv.height=h;ctx.drawImage(img,0,0,w,h);r=cv.toDataURL('image/jpeg',q);}cb(r);};img.src=e.target.result;};reader.readAsDataURL(file);}

/* ══ SCANNER ══ */
var _scanStream=null;
var _scanDetector=null;
var _scanProjectId=null;
var _scanAnimFrame=null;
var _scanTab='cylinder'; /* 'cylinder' | 'door' */

/* ── Tab switching ── */
function switchScanTab(tab){
  _scanTab=tab;
  var isCyl=tab==='cylinder';
  /* tab buttons */
  byId('scan-tab-cylinder').style.borderBottomColor=isCyl?'#F57C20':'transparent';
  byId('scan-tab-cylinder').style.color=isCyl?'#F57C20':'#888';
  byId('scan-tab-door').style.borderBottomColor=isCyl?'transparent':'#2D2D2D';
  byId('scan-tab-door').style.color=isCyl?'#888':'#2D2D2D';
  /* bodies */
  byId('scan-body-cylinder').style.display=isCyl?'':'none';
  byId('scan-body-door').style.display=isCyl?'none':'';
  /* scan frame color */
  byId('scan-frame').style.borderColor=isCyl?'#F57C20':'#2D2D2D';
  /* clear inputs & error */
  byId('scan-input-cylinder').value='';
  byId('scan-input-door').value='';
  byId('scan-error').style.display='none';
  /* update hint */
  byId('scan-hint').textContent='Richt op QR-code of streepjescode';
}

function openScanner(pid){
  _scanProjectId=pid;
  switchScanTab('cylinder');
  byId('modal-scan').classList.add('open');
  startCamera();
}

function closeScanner(){
  stopCamera();
  byId('modal-scan').classList.remove('open');
}

function stopCamera(){
  if(_scanAnimFrame){cancelAnimationFrame(_scanAnimFrame);_scanAnimFrame=null;}
  if(_scanStream){_scanStream.getTracks().forEach(function(t){t.stop();});_scanStream=null;}
  var vid=byId('scan-video');if(vid)vid.srcObject=null;
}

function startCamera(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    byId('scan-hint').textContent='Camera niet beschikbaar — gebruik handmatige invoer';return;
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}})
    .then(function(stream){
      _scanStream=stream;
      var vid=byId('scan-video');
      vid.srcObject=stream;
      vid.play();
      vid.addEventListener('loadedmetadata',function(){tryBarcodeDetector();},{once:true});
    })
    .catch(function(){
      byId('scan-hint').textContent='Geen cameratoegang — gebruik handmatige invoer';
    });
}

function tryBarcodeDetector(){
  if(!('BarcodeDetector' in window)){
    byId('scan-hint').textContent='Auto-scan niet ondersteund — gebruik handmatige invoer';
    return;
  }
  try{
    _scanDetector=new BarcodeDetector({formats:['qr_code','code_128','code_39','ean_8','ean_13','upc_a','upc_e','data_matrix']});
    byId('scan-hint').textContent='Richt op QR-code of streepjescode';
    scanFrame();
  }catch(e){
    byId('scan-hint').textContent='Scanner niet beschikbaar — gebruik handmatige invoer';
  }
}

function scanFrame(){
  var vid=byId('scan-video');
  if(!vid||!_scanDetector||!_scanStream)return;
  _scanDetector.detect(vid)
    .then(function(results){
      if(results&&results.length>0){
        var raw=results[0].rawValue.trim();
        stopCamera();
        if(_scanTab==='cylinder'){
          /* extract 8-digit number */
          var m=raw.match(/(\d{8})/);
          var code=m?m[1]:raw.replace(/\D/g,'').slice(0,8);
          handleCylinderScan(code);
        } else {
          handleDoorScan(raw);
        }
        return;
      }
      _scanAnimFrame=requestAnimationFrame(scanFrame);
    })
    .catch(function(){_scanAnimFrame=requestAnimationFrame(scanFrame);});
}

/* ══ CYLINDER SCAN ══ */
function handleCylinderScan(code){
  code=(code||'').trim().replace(/\s/g,'');
  var err=byId('scan-error');
  err.style.display='none';
  if(!code||code.length<6){
    err.textContent='Voer minimaal 6 cijfers in.';err.style.display='';return;
  }
  var pid=_scanProjectId;
  var doors=DB.doors.filter(function(d){return d.projectId===pid;});

  /* exact match */
  var exact=doors.find(function(d){return(d.serial||'').trim()===code;});
  if(exact){closeScanner();_navToDoor(exact,pid,'Cilinder gevonden');return;}

  /* partial match */
  var partial=doors.filter(function(d){var s=(d.serial||'').trim();return s&&(s.indexOf(code)>=0||code.indexOf(s)>=0);});
  if(partial.length===1){closeScanner();_navToDoor(partial[0],pid,'Cilinder gevonden');return;}

  /* not found — offer to link */
  var unlinked=doors.filter(function(d){return !d.serial||d.serial.trim()==='';});
  closeScanner();
  _showCylinderLinkModal(code,pid,unlinked,partial);
}

function _showCylinderLinkModal(code,pid,unlinked,ambiguous){
  var html='<h2>&#128273; Cilinder '+code+'</h2>';
  if(ambiguous&&ambiguous.length>1){
    html+='<div style="background:#FFF3E0;border:2px solid #FFCC80;border-radius:10px;color:#E65100;font-size:14px;padding:10px 14px;margin-bottom:14px">Meerdere deuren met vergelijkbaar nummer. Kies de juiste:</div>';
    ambiguous.forEach(function(d){html+=_doorPickRow(d,pid,'linkCylinderToDoor(\''+d.id+'\',\''+code+'\',\''+pid+'\')',(d.serial||'—'));});
  } else if(!unlinked.length){
    html+='<div style="background:#FFEBEE;border:2px solid #EF9A9A;border-radius:10px;color:#C62828;font-size:14px;padding:12px 14px;margin-bottom:14px">Serienummer <b>'+code+'</b> niet gevonden en er zijn geen deuren zonder serienummer in dit project.</div>';
  } else {
    html+='<div style="background:#E3F2FD;border:2px solid #90CAF9;border-radius:10px;color:#1565C0;font-size:14px;padding:10px 14px;margin-bottom:14px">Serienummer <b>'+code+'</b> nog niet gekoppeld. Kies de bijbehorende deur:</div>';
    unlinked.forEach(function(d){html+=_doorPickRow(d,pid,'linkCylinderToDoor(\''+d.id+'\',\''+code+'\',\''+pid+'\')',null);});
  }
  html+='<div class="modal-footer"><button class="btn" onclick="closeModal(\'modal-generic\')">Annuleren</button></div>';
  openModal(html);
}

function linkCylinderToDoor(did,code,pid){
  var door=DB.doors.find(function(d){return d.id===did;});if(!door)return;
  door.serial=code;saveDB();
  closeModal('modal-generic');
  showToast('Cilinder '+code+' gekoppeld aan '+doorName(door));
  _navToDoor(door,pid,null);
}

/* ══ DOOR SCAN ══ */
function handleDoorScan(code){
  code=(code||'').trim();
  var err=byId('scan-error');
  err.style.display='none';
  if(!code){err.textContent='Voer een deurnummer in.';err.style.display='';return;}

  var pid=_scanProjectId;
  var doors=DB.doors.filter(function(d){return d.projectId===pid;});
  var q=code.toLowerCase();

  /* match against doornumber field first, then kamer, then naam */
  var exact=doors.find(function(d){
    return (d.doornumber||'').trim().toLowerCase()===q||
           (d.kamer||'').trim().toLowerCase()===q||
           (d.naam||'').trim().toLowerCase()===q;
  });
  if(exact){closeScanner();_navToDoor(exact,pid,'Deur gevonden');return;}

  /* partial match */
  var partial=doors.filter(function(d){
    return (d.doornumber||'').toLowerCase().indexOf(q)>=0||
           (d.kamer||'').toLowerCase().indexOf(q)>=0||
           (d.naam||'').toLowerCase().indexOf(q)>=0;
  });
  if(partial.length===1){closeScanner();_navToDoor(partial[0],pid,'Deur gevonden');return;}

  /* not found or multiple — show link/choice modal */
  closeScanner();
  _showDoorLinkModal(code,pid,doors,partial);
}

function _showDoorLinkModal(code,pid,allDoors,partial){
  var html='<h2>&#128682; Deur "'+code+'"</h2>';
  if(partial.length>1){
    html+='<div style="background:#FFF3E0;border:2px solid #FFCC80;border-radius:10px;color:#E65100;font-size:14px;padding:10px 14px;margin-bottom:14px">Meerdere deuren gevonden. Kies de juiste:</div>';
    partial.forEach(function(d){html+=_doorPickRow(d,pid,'linkDoorNumber(\''+d.id+'\',\''+code+'\',\''+pid+'\')',d.doornumber||null);});
  } else {
    /* No match at all — let user pick which door to tag with this number */
    html+='<div style="background:#E3F2FD;border:2px solid #90CAF9;border-radius:10px;color:#1565C0;font-size:14px;padding:10px 14px;margin-bottom:14px">Deurnummer <b>'+code+'</b> nog niet bekend. Koppel het aan een deur:</div>';
    var untagged=allDoors.filter(function(d){return !d.doornumber||d.doornumber.trim()==='';});
    var pool=untagged.length?untagged:allDoors;
    pool.forEach(function(d){html+=_doorPickRow(d,pid,'linkDoorNumber(\''+d.id+'\',\''+code+'\',\''+pid+'\')',d.doornumber||null);});
  }
  html+='<div class="modal-footer"><button class="btn" onclick="closeModal(\'modal-generic\')">Annuleren</button></div>';
  openModal(html);
}

function linkDoorNumber(did,code,pid){
  var door=DB.doors.find(function(d){return d.id===did;});if(!door)return;
  door.doornumber=code;saveDB();
  closeModal('modal-generic');
  showToast('Deurnummer '+code+' gekoppeld aan '+doorName(door));
  _navToDoor(door,pid,null);
}

/* ── shared helpers ── */
function _doorPickRow(d,pid,onclick,extra){
  return '<div onclick="'+onclick+'" style="border:2px solid #E0E0E0;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:8px;padding:12px 14px" onmouseover="this.style.borderColor=&apos;#F57C20&apos;" onmouseout="this.style.borderColor=&apos;#E0E0E0&apos;">'+
    '<div style="flex:1">'+
    '<div style="font-weight:700;color:#2D2D2D">'+doorName(d)+'</div>'+
    '<div style="color:#888;font-size:13px;margin-top:2px">'+
    (d.verdieping?'Verd. '+d.verdieping+' · ':'')+
    (d.kamer?'Kamer '+d.kamer+' · ':'')+(d.type||'')+
    (extra?' · <span style="color:#1565C0;font-weight:700">'+extra+'</span>':'')+
    '</div></div>'+
    '<span style="color:#F57C20;font-size:20px">&#8250;</span></div>';
}

function _navToDoor(door,pid,toastMsg){
  if(toastMsg)showToast(toastMsg+': '+doorName(door));
  if(session.role==='admin'){adminGo('install',{doorId:door.id,projectId:pid});}
  else{installerOpenDoor(door.id);}
}

/* Close scan modal on backdrop click */
document.addEventListener('DOMContentLoaded',function(){
  var bg=byId('modal-scan');
  if(bg)bg.addEventListener('click',function(e){if(e.target===bg)closeScanner();});
});

/* ══ INIT ══ */
renderLogin();
